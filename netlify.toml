[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/auth/discord/login"
  to = "/.netlify/functions/discord-login"
  status = 200

[[redirects]]
  from = "/api/auth/discord/callback"
  to = "/.netlify/functions/discord-callback"
  status = 200

[[redirects]]
  from = "/api/economy/balance"
  to = "/.netlify/functions/economy-balance"
  status = 200

[[redirects]]
  from = "/api/listings"
  to = "/.netlify/functions/listings"
  status = 200

[[redirects]]
  from = "/api/active-properties"
  to = "/.netlify/functions/active-properties"
  status = 200

[[redirects]]
  from = "/api/management/logs"
  to = "/.netlify/functions/management-logs"
  status = 200

[[redirects]]
  from = "/api/management/create-listing"
  to = "/.netlify/functions/management-create-listing"
  status = 200

[[redirects]]
  from = "/api/management/listings"
  to = "/.netlify/functions/management-listings"
  status = 200

[[redirects]]
  from = "/api/listings/request-purchase"
  to = "/.netlify/functions/request-purchase"
  status = 200

[[redirects]]
  from = "/api/my-requests"
  to = "/.netlify/functions/my-purchase-requests"
  status = 200

[[redirects]]
  from = "/api/management/requests"
  to = "/.netlify/functions/management-requests"
  status = 200

[[redirects]]
  from = "/api/management/owned-listings"
  to = "/.netlify/functions/management-owned-listings"
  status = 200

[[redirects]]
  from = "/api/management/user-economy"
  to = "/.netlify/functions/management-user-economy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
